<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZONA DE DESCARGA DE ALBERT OFICIAL</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* TEXTO RGB */
@keyframes rgbText{
0%{color:red;}
25%{color:blue;}
50%{color:white;}
75%{color:magenta;}
100%{color:red;}
}

/* HEADER */
.header{text-align:center;padding:20px;}
.header h1{animation:rgbText 5s infinite linear;}

/* FOTO */
.creador{text-align:center;margin:20px;}
.creador img{
width:90%;
max-width:400px;
border-radius:15px;
padding:4px;
background:linear-gradient(45deg, red, blue, white, magenta);
background-size:300% 300%;
animation:bordeRGB 4s linear infinite;
}
@keyframes bordeRGB{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
.creador p{
animation:rgbText 5s infinite linear;
font-weight:bold;
}

/* BUSCADOR */
.search{
padding:12px;
width:90%;
margin:10px auto;
display:block;
border-radius:10px;
border:none;
background:#111;
color:#fff;
}

/* CARDS */
.container{padding:15px;}
.card{
background:#111;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 10px red;
transition:0.3s;
}
.card:hover{
transform:scale(1.02);
box-shadow:0 0 25px red;
}
.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* BOTONES */
.btn{
background:red;
color:#000;
padding:12px;
margin-top:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}
.btn:hover{
background:#ff3333;
box-shadow:0 0 15px red;
}

/* LOGIN MODAL */
#loginModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.login-box{
background:#111;
padding:20px;
border-radius:15px;
text-align:center;
width:80%;
max-width:300px;
border:2px solid;
animation:rgbBorder 4s infinite linear;
}

.login-box h3{
animation:rgbText 5s infinite linear;
}

.login-box input{
width:90%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#000;
color:#fff;
text-align:center;
}

/* INPUTS PRO */
.input-box{
position:relative;
margin-top:15px;
padding:2px;
border-radius:12px;
background:linear-gradient(45deg, red, blue, white, magenta, red);
background-size:300% 300%;
animation:rgbBorder 4s linear infinite;
}

.input-box input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#000;
color:#fff;
outline:none;
}

@keyframes rgbBorder{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* PANEL ADMIN */
#adminPanel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
padding:20px;
overflow:auto;
}
</style>
</head>

<body>

<div class="header">
<h1>ZONA DE DESCARGA DE ALBERT OFICIAL</h1>
</div>

<div class="creador">
<img src="https://i.imgur.com/jJwW8vt.jpeg">
<p>ALBERT OFICIAL CREADOR</p>
</div>

<input class="search" placeholder="Buscar..." onkeyup="buscar(this.value)">

<div class="container" id="lista"></div>

<div class="btn" onclick="abrirLogin()">ACESSO ADMIN</div>

<!-- LOGIN -->
<div id="loginModal">
<div class="login-box">
<h3>🔐 Acceso Admin</h3>
<input type="password" id="clave" placeholder="Ingresa clave">
<div class="btn" onclick="verificar()">ENTRAR</div>
<div class="btn" onclick="cerrarLogin()">CANCELAR</div>
</div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel">
<h2>ALBERT OFICIAL</h2>

<div class="input-box">
<input id="nombre" placeholder="Nombre del archivo">
</div>

<div class="input-box">
<input id="link" placeholder="Link de descarga">
</div>

<div class="input-box">
<input id="imagen" placeholder="URL de la imagen">
</div>

<div class="btn" onclick="agregar()">AGREGAR</div>
<div class="btn" onclick="cerrar()">CERRAR</div>

<div id="adminLista"></div>
</div>

<script>
let archivos = JSON.parse(localStorage.getItem("archivos")) || [];

function render(){
let html="";
archivos.forEach((a,i)=>{
html+=`
<div class="card">
<img src="${a.imagen}">
<h2>${a.nombre}</h2>
<div class="btn" onclick="descargar(${i})">DESCARGAR</div>
</div>
`;
});
document.getElementById("lista").innerHTML=html;
}
render();

function descargar(i){
window.location.href = archivos[i].link;
}

function buscar(text){
let filtrados = archivos.filter(a=>a.nombre.toLowerCase().includes(text.toLowerCase()));
let html="";
filtrados.forEach((a)=>{
html+=`
<div class="card">
<img src="${a.imagen}">
<h2>${a.nombre}</h2>
<div class="btn" onclick="window.location.href='${a.link}'">DESCARGAR</div>
</div>
`;
});
document.getElementById("lista").innerHTML=html;
}

/* LOGIN */
function abrirLogin(){
document.getElementById("loginModal").style.display="flex";
}

function cerrarLogin(){
document.getElementById("loginModal").style.display="none";
}

function verificar(){
let pass=document.getElementById("clave").value;
if(pass==="2927"){
cerrarLogin();
document.getElementById("adminPanel").style.display="block";
}else{
alert("Clave incorrecta");
}
}

/* ADMIN */
function agregar(){
let n=nombre.value;
let l=link.value;
let img=imagen.value;

archivos.push({nombre:n,link:l,imagen:img});
localStorage.setItem("archivos",JSON.stringify(archivos));
render();
}

function cerrar(){
document.getElementById("adminPanel").style.display="none";
}
</script>

</body>
</html>
